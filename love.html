<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Heart Animation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-top: #2b0b16;
      --bg-mid: #12050a;
      --bg-bottom: #000000;
      --panel: rgba(33, 8, 16, 0.72);
      --panel-border: rgba(255, 174, 200, 0.18);
      --text-main: #ffe5ee;
      --text-soft: #ffc3d7;
      --accent-start: #ff6f9f;
      --accent-end: #ff3d78;
      --accent-shadow: rgba(255, 89, 143, 0.35);
    }

    body {
      overflow: hidden;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, var(--bg-top) 0%, var(--bg-mid) 45%, var(--bg-bottom) 100%);
      color: var(--text-main);
      -webkit-tap-highlight-color: transparent;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .overlay {
      position: fixed;
      left: 50%;
      bottom: 8vh;
      transform: translateX(-50%);
      width: min(92vw, 420px);
      padding: 20px;
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.32);
      text-align: center;
    }

    .subtitle {
      margin-bottom: 14px;
      font-size: 15px;
      color: var(--text-soft);
      letter-spacing: 0.04em;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 220px;
      padding: 14px 22px;
      border: 0;
      border-radius: 999px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      color: #fff6fa;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      box-shadow: 0 16px 32px var(--accent-shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 20px 36px rgba(255, 89, 143, 0.45);
      filter: brightness(1.05);
    }

    @media (max-width: 560px) {
      .overlay {
        bottom: max(16px, env(safe-area-inset-bottom));
        width: min(94vw, 380px);
        padding: 18px 16px;
        border-radius: 22px;
      }

      .subtitle {
        margin-bottom: 12px;
        font-size: 14px;
      }

      .button {
        min-width: 100%;
        min-height: 54px;
        padding: 14px 18px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="overlay">
    <p class="subtitle">A little something for my Asya</p>
    <a class="button" href="question.html">Open the next page</a>
  </div>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    const TEXT = "I love you";
    const CENTER_TEXT = "I love you, my Asya";
    const NUM_STEPS = 140;
    let angle = 0;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function heartX(t) {
      return 16 * Math.pow(Math.sin(t), 3);
    }

    function heartY(t) {
      return (
        13 * Math.cos(t) -
        5 * Math.cos(2 * t) -
        2 * Math.cos(3 * t) -
        Math.cos(4 * t)
      );
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const isMobile = canvas.width <= 560;
      const cy = canvas.height / 2 - (isMobile ? 38 : 0);
      const heartScale = isMobile ? 8.4 : 11;
      const pulse = 1 + 0.08 * Math.sin(angle * 2);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      for (let i = 0; i < NUM_STEPS; i++) {
        const t = (Math.PI * 2 * i) / NUM_STEPS;
        const x = heartX(t) * heartScale * pulse;
        const y = -heartY(t) * heartScale * pulse;

        const alpha = 0.45 + 0.55 * Math.sin(angle + i * 0.15);
        const baseFont = isMobile ? 9.5 : 12;
        const swing = isMobile ? 4 : 6;
        const fontSize = baseFont + swing * Math.sin(angle * 1.4 + i * 0.2);

        ctx.font = `bold ${fontSize.toFixed(1)}px Arial`;
        ctx.fillStyle = `rgba(255, 70, 120, ${Math.max(0.2, alpha).toFixed(2)})`;
        ctx.fillText(TEXT, cx + x, cy + y);
      }

      ctx.font = isMobile ? "bold 21px Arial" : "bold 28px Arial";
      ctx.fillStyle = "rgba(255, 210, 225, 0.95)";
      ctx.fillText(CENTER_TEXT, cx, cy);

      angle += 0.03;
      requestAnimationFrame(draw);
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    draw();
  </script>
</body>
</html>
